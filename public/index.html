<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LAN Chat</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell" aria-label="LAN Chat">
      <section class="sidebar" aria-label="People online">
        <div>
          <p class="eyebrow">Same network</p>
          <h1>LAN Chat</h1>
        </div>

        <form class="name-form" id="nameForm">
          <label for="nameInput">Your name</label>
          <div class="inline-control">
            <input id="nameInput" name="name" maxlength="24" placeholder="Your name" autocomplete="name">
            <button type="submit">Set</button>
          </div>
        </form>

        <div class="people">
          <div class="section-title">
            <span>Online</span>
            <strong id="onlineCount">0</strong>
          </div>
          <ul id="userList" aria-live="polite"></ul>
        </div>
      </section>

      <section class="chat" aria-label="Messages">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Local room</p>
            <h2>Everyone</h2>
          </div>
          <p id="connectionStatus" class="status">Connecting</p>
        </header>

        <ol id="messages" class="messages" aria-live="polite"></ol>

        <p id="typingStatus" class="typing" aria-live="polite"></p>

        <form id="messageForm" class="message-form">
          <label class="sr-only" for="messageInput">Message</label>
          <textarea id="messageInput" maxlength="500" rows="1" placeholder="Message everyone on this network"></textarea>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
